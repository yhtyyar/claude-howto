name: pre-commit
description: Run pre-commit checks
type: pre-commit

config:
  fail_fast: true
  timeout: 180
  parallel: true
  max_concurrent: 4

steps:
  - id: lint
    name: Run linter
    type: command
    config:
      command: echo
      args: ["Linting complete"]
    timeout: 30

  - id: test
    name: Run tests
    type: command
    config:
      command: echo
      args: ["Tests passed"]
    depends_on: [lint]
    timeout: 60
